name: Build

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build-and-test:
    runs-on: windows-latest
    permissions:
      contents: write # needed for vpk upload github to create the release
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history/tags so GitInfo can compute the version

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      # The App project has a <COMReference> (IWshRuntimeLibrary) for creating .lnk shortcuts.
      # ResolveComReference is not supported by the .NET (Core) MSBuild bundled with the SDK,
      # so building/publishing the App project needs the desktop (Visual Studio) MSBuild.
      - uses: microsoft/setup-msbuild@v2

      - name: Restore
        run: dotnet restore StartLauncher.sln

      - name: Build
        run: msbuild StartLauncher.sln /p:Configuration=Release /p:Platform="Any CPU" /nologo /verbosity:minimal

      - name: Test
        run: dotnet test StartLauncher.Tests/StartLauncher.Tests.csproj -c Release --no-build

      - name: Publish
        if: github.event_name == 'push'
        run: msbuild StartLauncher.App/StartLauncher.App.csproj /t:Publish /p:Configuration=Release /p:RuntimeIdentifier=win-x64 /p:SelfContained=true /p:PublishSingleFile=false /p:PublishDir=${{ github.workspace }}\publish\ /nologo /verbosity:minimal

      - name: Determine version
        if: github.event_name == 'push'
        id: version
        shell: bash
        run: |
          # Patch = total commit count, so every push to master gets a fresh, ascending
          # version automatically. Bump the "1.0" prefix by hand if a major/minor bump is ever needed.
          # (The assembly's own AssemblyVersion is still git-tag-derived via GitInfo — that's
          # independent and only used for diagnostics, not for picking the release version.)
          echo "version=1.0.$(git rev-list --count HEAD)" >> "$GITHUB_OUTPUT"

      - name: Package with Velopack
        if: github.event_name == 'push'
        run: |
          dotnet tool install -g vpk
          vpk pack -u StartLauncher -v ${{ steps.version.outputs.version }} -p ./publish -e StartLauncher.exe -i StartLauncher.App/Resources/Bokehlicia-Captiva-Rocket.ico -o ./Releases

      - name: Publish release to GitHub
        if: github.event_name == 'push'
        run: vpk upload github -o ./Releases --repoUrl https://github.com/matthiaslischka/StartLauncher --token ${{ secrets.GITHUB_TOKEN }} --publish --merge
